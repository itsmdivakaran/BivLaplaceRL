reference:
- title: "Parametric Distributions"
  desc: >
    Four bivariate families used as running examples throughout the package:
    Gumbel bivariate exponential, Farlie-Gumbel-Morgenstern (FGM), bivariate
    power, and Schur-constant.  Each provides d/p/s/r functions where applicable.
  contents:
  - starts_with("dgumbel_biv")
  - starts_with("pgumbel_biv")
  - starts_with("sgumbel_biv")
  - starts_with("rgumbel_biv")
  - starts_with("pfgm_biv")
  - starts_with("dfgm_biv")
  - starts_with("sfgm_biv")
  - starts_with("rfgm_biv")
  - starts_with("pbivpower")
  - starts_with("sbivpower")
  - starts_with("dbivpower")
  - starts_with("rbivpower")
  - starts_with("sschur_biv")
  - starts_with("rschur_biv")

- title: "Bivariate Laplace Transform of Residual Lives"
  desc: >
    Core functions from Jayalekshmi, Rajesh & Nair (2022, *Comm. Stat.* Theory
    and Methods).  Covers the closed-form Gumbel result, general numerical
    integration, bivariate hazard gradient and MRL, NBUHR/NWUHR aging class
    characterisation, nonparametric estimation, and a Monte-Carlo simulator.
  contents:
  - blt_residual
  - blt_residual_gumbel
  - biv_hazard_gradient
  - biv_mean_residual
  - nbuhr_test
  - np_blt_residual
  - sim_blt_residual

- title: "Bivariate Laplace Transform of Reversed Residual Lives"
  desc: >
    Implements the BLt-Rrl framework from Jayalekshmi & Rajesh (*Int. J.
    Reliability, Quality & Safety Eng.*): reversed hazard gradient, reversed
    mean residual life, and closed-form results for FGM and bivariate power
    distributions.
  contents:
  - blt_reversed
  - blt_reversed_fgm
  - blt_reversed_power
  - biv_rhazard_gradient
  - biv_rmrl

- title: "Univariate Residual Life Analysis"
  desc: >
    Univariate Laplace transform of residual life
    \eqn{L_X(s,t) = E[e^{-sX} | X > t]}, hazard rate \eqn{h(t) = f(t)/\bar{F}(t)},
    mean residual life \eqn{m(t) = E[X-t | X > t]}, and a nonparametric estimator.
  contents:
  - lt_residual
  - hazard_rate
  - mean_residual
  - np_lt_residual

- title: "Stochastic Ordering (Bivariate)"
  desc: >
    Seven bivariate stochastic order checks: BLt-rl, BLt-Rrl, weak bivariate
    hazard rate, MRL, bivariate relative MRL, reversed hazard rate, and
    reversed MRL.  Each function returns a logical flag and supporting
    diagnostic values.
  contents:
  - blt_order_residual
  - blt_order_reversed
  - biv_whr_order
  - biv_wmrl_order
  - biv_brlmr_order
  - biv_wrhr_order
  - biv_wrmrl_order

- title: "Stochastic Ordering (Univariate)"
  desc: >
    Three univariate stochastic order checks based on the Laplace transform of
    residual life, hazard rate, and mean residual life.
  contents:
  - lt_rl_order
  - hr_order
  - mrl_order

- title: "Entropy and Information Generating Functions"
  desc: >
    Shannon differential entropy and Golomb's (1966) information generating
    function for non-negative continuous random variables.
  contents:
  - shannon_entropy
  - info_gen_function

- title: "Plotting Utilities"
  desc: >
    Convenience wrappers that produce ready-made plots for the BLT of residual
    lives and the BLT of reversed residual lives.
  contents:
  - plot_blt_residual
  - plot_blt_reversed

- title: "Package"
  desc: Package-level documentation and metadata.
  contents:
  - BivLaplaceRL-package

footer:
  structure:
    left:  developed_by
    right: built_with
