url: https://maheshdivakaran.github.io/BivLaplaceRL/

template:
  bootstrap: 5
  bootswatch: flatly
  bslib:
    primary: "#2c7bb6"
    base_font:
      google: "Nunito"
    heading_font:
      google: "Montserrat"

home:
  title: "BivLaplaceRL — Bivariate Laplace Transforms & Entropy in Reliability"
  description: >
    R package implementing bivariate Laplace transforms of residual and
    reversed residual lives, associated stochastic orders, and the residual
    entropy generating function, based on research by Jayalekshmi, Rajesh,
    Nair and Smitha.
  links:
  - text: GitHub repository
    href: https://github.com/maheshdivakaran/BivLaplaceRL
  - text: Report a bug
    href: https://github.com/maheshdivakaran/BivLaplaceRL/issues

navbar:
  structure:
    left:  [intro, reference, articles, news]
    right: [search, github]
  components:
    intro:
      text: Introduction
      href: articles/introduction.html
    reference:
      text: Reference
      href: reference/index.html
    articles:
      text: Articles
      menu:
      - text: Introduction to BivLaplaceRL
        href: articles/introduction.html
    news:
      text: Changelog
      href: news/index.html
    github:
      icon: fab fa-github fa-lg
      href: https://github.com/maheshdivakaran/BivLaplaceRL

reference:
- title: "Parametric Distributions"
  desc: >
    Gumbel bivariate exponential, FGM, bivariate power, and Schur-constant
    distributions: density, CDF, survival function, and random generation.
  contents:
  - starts_with("dgumbel_biv")
  - starts_with("pgumbel_biv")
  - starts_with("sgumbel_biv")
  - starts_with("rgumbel_biv")
  - starts_with("pfgm_biv")
  - starts_with("dfgm_biv")
  - starts_with("sfgm_biv")
  - starts_with("rfgm_biv")
  - starts_with("pbivpower")
  - starts_with("sbivpower")
  - starts_with("dbivpower")
  - starts_with("rbivpower")
  - starts_with("sschur_biv")
  - starts_with("rschur_biv")

- title: "Bivariate Laplace Transform of Residual Lives"
  desc: >
    Functions for computing and testing the bivariate Laplace transform of
    residual lives, including closed-form results for the Gumbel distribution,
    nonparametric estimation, and the NBUHR/NWUHR aging class test.
  contents:
  - blt_residual
  - blt_residual_gumbel
  - biv_hazard_gradient
  - biv_mean_residual
  - nbuhr_test
  - np_blt_residual
  - sim_blt_residual

- title: "Bivariate Laplace Transform of Reversed Residual Lives"
  desc: >
    Functions for computing the bivariate Laplace transform of past (reversed)
    residual lives, the reversed hazard gradient, and the reversed MRL.
  contents:
  - blt_reversed
  - blt_reversed_fgm
  - blt_reversed_power
  - biv_rhazard_gradient
  - biv_rmrl

- title: "Stochastic Ordering"
  desc: >
    Functions for checking bivariate stochastic orders: BLt-rl, BLt-Rrl,
    weak bivariate hazard rate, MRL, reversed hazard rate, and reversed MRL
    orders.
  contents:
  - blt_order_residual
  - blt_order_reversed
  - biv_whr_order
  - biv_wmrl_order
  - biv_brlmr_order
  - biv_wrhr_order
  - biv_wrmrl_order

- title: "Entropy and Information Generating Functions"
  desc: >
    Shannon entropy, Golomb information generating function, residual entropy,
    and the residual entropy generating function (REGF) with nonparametric
    estimation.
  contents:
  - shannon_entropy
  - info_gen_function
  - residual_entropy
  - residual_info_gen
  - regf_profile
  - regf_characterise
  - np_residual_info_gen
  - sim_regf

- title: "Plotting Utilities"
  desc: Ready-made plots for Laplace transforms and entropy measures.
  contents:
  - plot_blt_residual
  - plot_blt_reversed
  - plot_regf

- title: "Package"
  contents:
  - BivLaplaceRL-package

footer:
  structure:
    left: developed_by
    right: built_with
